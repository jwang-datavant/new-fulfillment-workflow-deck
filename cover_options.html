<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cover — Options</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Geist', -apple-system, sans-serif;
  background: #0d0d1a; color: #fff;
  padding: 48px 48px 80px; display: flex; flex-direction: column; gap: 0;
}
.page-title { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
.page-sub   { font-size: 13px; color: rgba(255,255,255,0.4); margin-bottom: 48px; }

.option { margin-bottom: 56px; }
.option-meta { display: flex; align-items: baseline; gap: 14px; margin-bottom: 12px; }
.option-tag {
  font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
  background: rgba(41,69,240,0.2); color: #7b96ff;
  border: 1px solid rgba(41,69,240,0.35); border-radius: 3px; padding: 3px 10px;
}
.option-name { font-size: 15px; font-weight: 600; color: #fff; }
.option-desc { font-size: 12px; color: rgba(255,255,255,0.4); margin-left: auto; }

.slide-wrap {
  width: 960px; height: 540px; border-radius: 6px; overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3), 0 12px 48px rgba(0,0,0,0.45);
  border: 1px solid rgba(255,255,255,0.06);
  position: relative;
}
.slide-wrap iframe {
  width: 960px; height: 608px;
  border: none; display: block;
  transform: translateY(-68px);
}

hr { border: none; border-top: 1px solid rgba(255,255,255,0.06); margin: 0 0 56px; }
</style>
</head>
<body>

<div class="page-title">Cover Slide — 3 Options</div>
<div class="page-sub">Pick a title direction. Orb and HealthSource tag removed from all.</div>

<div class="option">
  <div class="option-meta">
    <div class="option-tag">Option A</div>
    <div class="option-name">Original</div>
    <div class="option-desc">Intelligent ROI: Building a Task-Based Fulfillment Workflow</div>
  </div>
  <div class="slide-wrap">
    <iframe src="slide_01_opt_a.html" scrolling="no"></iframe>
  </div>
</div>
<hr>

<div class="option">
  <div class="option-meta">
    <div class="option-tag">Option B</div>
    <div class="option-name">Fulfillment Automation</div>
    <div class="option-desc">ROI Fulfillment Automation</div>
  </div>
  <div class="slide-wrap">
    <iframe src="slide_01_opt_b.html" scrolling="no"></iframe>
  </div>
</div>
<hr>

<div class="option">
  <div class="option-meta">
    <div class="option-tag">Option C</div>
    <div class="option-name">Fulfillment Efficiency</div>
    <div class="option-desc">Efficient ROI Fulfillment</div>
  </div>
  <div class="slide-wrap">
    <iframe src="slide_01_opt_c.html" scrolling="no"></iframe>
  </div>
</div>

</body>
</html>
